<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gust Stream — Control Center</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color: #0d1313;
    --bg-gradient: radial-gradient(circle at 80% 20%, #1a2928 0%, #0d1313 100%);
    --panel-color: rgba(23, 34, 33, 0.6);
    --accent-color: #C9996B;
    --accent-glow: rgba(201, 153, 107, 0.15);
    --text-main: #EDE9E6;
    --text-muted: #A8B8B4;
    --border-color: rgba(255,255,255,0.05);
    --status-disconnected: #ff4a4a;
    --status-connected: #3dd68c;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-gradient);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 60px 20px;
}

.app-wrapper {
    display: flex;
    width: 100%;
    max-width: 1050px;
    background: var(--panel-color);
    border: 1px solid var(--border-color);
    border-radius: 24px;
    backdrop-filter: blur(20px);
    overflow: hidden;
}

.product-hero {
    flex: 1;
    padding: 50px;
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.brand h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
}

.brand p {
    font-size: 11px;
    color: var(--accent-color);
    text-transform: uppercase;
    letter-spacing: 2px;
}

.product-desc h2 {
    font-size: 32px;
    font-weight: 300;
    line-height: 1.2;
    margin-bottom: 20px;
}

.product-desc h2 span {
    color: var(--accent-color);
}

.product-desc p {
    color: var(--text-muted);
    line-height: 1.6;
}

.config-panel {
    flex: 1.1;
    padding: 50px;
    background: rgba(10,15,15,0.3);
}

.btn {
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 1px solid var(--accent-color);
    color: var(--accent-color);
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: var(--accent-color);
    color: black;
}

.status-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin: 15px 0 30px;
}

.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--status-disconnected);
}

.status-dot.connected {
    background: var(--status-connected);
}

.status-text.connected {
    color: var(--status-connected);
}

.setting-group {
    margin-bottom: 22px;
}

.setting-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
}

input[type=range] {
    width: 100%;
}

.value {
    color: var(--accent-color);
    font-family: monospace;
}
</style>
</head>

<body>

<div class="app-wrapper">

<div class="product-hero">
    <div class="brand">
        <h1>Gust Stream</h1>
        <p>Wearable Input System</p>
    </div>

    <div class="product-desc">
        <h2>The future of precision, <span>on your finger</span>.</h2>
        <p>The Ring Mouse merges spatial ergonomics with high-fidelity telemetry hardware.</p>
    </div>
</div>

<div class="config-panel">

<button class="btn" id="connectBtn">CONNECT DEVICE</button>

<div class="status-container">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">Device offline</div>
</div>

<div class="setting-group">
    <div class="setting-header">
        <span>Sensitivity X</span>
        <span class="value" id="valSensX">0.35</span>
    </div>
    <input type="range" id="sensX" min="0.05" max="1.0" step="0.01" value="0.35">
</div>

<div class="setting-group">
    <div class="setting-header">
        <span>Sensitivity Y</span>
        <span class="value" id="valSensY">0.75</span>
    </div>
    <input type="range" id="sensY" min="0.05" max="2.0" step="0.01" value="0.75">
</div>

<div class="setting-group">
    <div class="setting-header">
        <span>Gyro Deadzone</span>
        <span class="value" id="valDeadzone">0.25</span>
    </div>
    <input type="range" id="deadzone" min="0.00" max="1.5" step="0.01" value="0.25">
</div>

</div>
</div>

<script>
const SERVICE_UUID = 'e729ff10-caa0-449e-b1cf-7c805f9b34fb';
const CHARACTERISTIC_UUID = 'e729ff11-caa0-449e-b1cf-7c805f9b34fb';

let bleDevice = null;
let configCharacteristic = null;

const connectBtn = document.getElementById('connectBtn');

const statusText = document.getElementById('statusText');
const statusDot = document.getElementById('statusDot');

const inputs = document.querySelectorAll('input[type=range]');

function updateLabels() {
    document.getElementById('valSensX').innerText =
        document.getElementById('sensX').value;

    document.getElementById('valSensY').innerText =
        document.getElementById('sensY').value;

    document.getElementById('valDeadzone').innerText =
        document.getElementById('deadzone').value;
}

inputs.forEach(input => {
    input.addEventListener('input', () => {
        updateLabels();
        sendSettings();
    });
});

connectBtn.addEventListener('click', async () => {

    try {

        bleDevice = await navigator.bluetooth.requestDevice({
            acceptAllDevices: true,
            optionalServices: [SERVICE_UUID]
        });

        console.log("Selected device:", bleDevice.name);

        const server = await bleDevice.gatt.connect();

        console.log("Connected to GATT");

        const service =
            await server.getPrimaryService(SERVICE_UUID);

        console.log("Got service");

        configCharacteristic =
            await service.getCharacteristic(CHARACTERISTIC_UUID);

        console.log("Got characteristic");

        statusText.innerText = "Connected";
        statusText.classList.add('connected');
        statusDot.classList.add('connected');

        connectBtn.innerText = "CONNECTED";

        sendSettings();

    } catch(err) {

        console.error(err);

        statusText.innerText = "Connection Failed";
    }
});

async function sendSettings() {

    if (!configCharacteristic) return;

    const vals = [
        parseFloat(document.getElementById('sensX').value),
        parseFloat(document.getElementById('sensY').value),
        parseFloat(document.getElementById('deadzone').value),
        0.007,
        2.0,
        0.5,
        0.85,
        0.04
    ];

    const buffer = new ArrayBuffer(32);

    const view = new DataView(buffer);

    vals.forEach((val, index) => {
        view.setFloat32(index * 4, val, true);
    });

    try {

        await configCharacteristic.writeValueWithoutResponse(buffer);

        console.log("Settings sent");

    } catch(err) {

        console.error("Write failed:", err);
    }
}
</script>

</body>
</html>
